# Veterinary listings scraper — scheduled aggregation.
#
# ENABLED AT LAUNCH 2026-07-10. Runs ONCE DAILY (08:30 UTC), matching dental's
# free-tier-safe cadence. Dental deliberately dropped from q3h -> 1x/day to stay
# inside the 2,000 free Linux-min/mo GitHub Actions ceiling shared per-account
# (see NETWORK-BUILDOUT-AND-RUNCOST.md). Do NOT restore the q3h cron — 3 daily
# verticals at q3h blows the budget; daily is the network standard.
#
# HOSTED 2026-07-10 at DentalAI22/vet-market-scrapers, PUBLIC ->
# GitHub Actions minutes are unlimited/free (the recommended path in the runcost
# doc; private repos share only 2,000 free Linux-min/mo across the account and
# dental already sits near that cliff). The job pushes back with the default
# GITHUB_TOKEN (permissions.contents: write) — no PAT needed.
#
# Mirrors the dental TDPM GitHub Action pattern: checkout -> install deps ->
# run scrapers -> normalize -> commit the updated dataset.

name: Scrape Veterinary Listings

on:
  workflow_dispatch: {}
  schedule:
    - cron: "30 8 * * *"    # daily full refresh at 08:30 UTC (free-tier-safe, matches dental)

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scrapers + normalize
        run: python run_all.py

      - name: Sanity-check dataset (guard the live source of truth)
        # The live sites now PULL this listings.json at build time (option b), so a
        # collapsed scrape — e.g. the runner IP gets blocked and the scrapers write
        # empty CSVs — must NOT be committed, or it would wipe the sites on their
        # next build. Fail loudly and keep the last-good committed dataset instead.
        # Floor is deliberately low (<20 of ~125) so real single-source churn still
        # flows through; it only trips on a near-total collapse.
        run: |
          COUNT=$(python -c "import json;print(len(json.load(open('listings.json'))))")
          echo "listings.json contains $COUNT listings"
          if [ "$COUNT" -lt 20 ]; then
            echo "::error::Dataset collapsed to $COUNT listings (<20) — refusing to commit; keeping last-good."
            exit 1
          fi

      - name: Commit refreshed dataset
        # WIRING (resolved 2026-07-10 — option (b)): this rig is its own GitHub repo
        # (DentalAI22/vet-market-scrapers, PUBLIC). It commits ONLY
        # its own tracked files here. It does NOT reach into the site repos —
        # ../veterinary (DentalAI22/market-network-template) and ../veterinarypractice
        # are SEPARATE git repos and the old cross-repo `git add` would have failed
        # once this became a standalone repo. Instead, each SITE repo PULLS this
        # repo's listings.json at build time (npm `prebuild` -> scripts/fetch-listings.mjs
        # -> the raw.githubusercontent URL of listings.json below), so a fresh
        # `vercel --prod` / rebuild republishes with the latest dataset. No cross-repo
        # push credentials required — the public raw file is the single source of truth.
        run: |
          git config user.name  "vet-scraper-bot"
          git config user.email "jonathan@tdibroker.com"
          git add listings.json output/*.csv site_id_registry.json
          if ! git diff --cached --quiet; then
            git commit -m "chore(vet): refresh listings $(date -u +%Y-%m-%dT%H:%MZ)"
            git pull --rebase origin main && git push
          else
            echo "No listing changes."
          fi
